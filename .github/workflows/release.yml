name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for keyless cosign signing via GitHub OIDC
      attestations: write  # required for SLSA provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign release artifacts
        env:
          COSIGN_YES: "true"
        run: |
          for artifact in dist/*.tar.gz dist/checksums.txt; do
            cosign sign-blob --bundle="${artifact}.bundle" --new-bundle-format=false "${artifact}"
          done

      - name: Upload signature bundles to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          find dist -name "*.bundle" -exec gh release upload "${tag}" {} --clobber \;

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v3.2.0
        with:
          subject-path: dist/*.tar.gz, dist/checksums.txt
