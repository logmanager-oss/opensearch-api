version: "2"

run:
  timeout: 5m

linters:
  # Defaults (errcheck, govet, ineffassign, staticcheck, unused) plus:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - prealloc
    - revive
    - unconvert
    - unparam
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: early-return

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/logmanager-oss/opensearch-api
